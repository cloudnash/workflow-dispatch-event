name: Manual Trigger Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        required: false
        default: 'dev'
      version:
        description: 'Version to deploy'
        required: true

jobs:
  display-inputs:
    runs-on: ubuntu-latest
    steps:
    - name: Print Input Values
      run: |
        echo "The environment is: ${{ github.event.inputs.environment }}"
        echo "The version is: ${{ github.event.inputs.version }}"
